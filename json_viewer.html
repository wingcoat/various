<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JSON Viewer — Upload • Validate • Expand/Collapse</title>
  <style>
    :root{
      --bg: #f9fafb; --panel: #ffffff; --muted: #6b7280; --text: #111827; --accent: #0ea5e9; --ok: #16a34a; --warn: #d97706; --err: #dc2626;
      --key: #2563eb; --string: #065f46; --number: #b91c1c; --boolean: #92400e; --null: #6d28d9; --object: #0e7490; --array: #a21caf;
      --btn-bg: #e5e7eb; --btn-hover: #d1d5db; --general-bg: #f3f4f6; --input-border: #d1d5db;
    }
    [data-theme="dark"]{
      --bg: #0f172a; --panel: #111827; --muted: #94a3b8; --text: #e5e7eb; --accent: #22d3ee; --ok: #22c55e; --warn: #f59e0b; --err: #ef4444;
      --key: #60a5fa; --string: #a7f3d0; --number: #fca5a5; --boolean: #fde68a; --null: #c4b5fd; --object: #67e8f9; --array: #f0abfc;
      --btn-bg: #1f2937; --btn-hover: #273449; --general-bg: #0b1226; --input-border: #334155;
    }
    *{box-sizing:border-box}
    body{margin: 0; background: var(--bg); color: var(--text); font: 14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,'Noto Sans','Helvetica Neue',Arial,sans-serif; transition: background .3s,color .3s}
    .container{max-width: 1100px; margin: 24px auto; padding: 0 16px}
    .card{background: var(--panel); border: 1px solid #1f2937; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,.35); transition: background .3s}
    .header{padding: 18px 20px; border-bottom:1px solid #1f2937; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between}
    .title{font-weight: 700; font-size: 18px}
    .controls{display: flex; gap: 8px; flex-wrap: wrap}
    .btn{appearance: none; border:none; background:var(--btn-bg); color: var(--text); padding: 8px 12px; border-radius: 12px; cursor: pointer; transition: background .2s}
    .btn:hover{background: var(--btn-hover)}
    .btn:disabled{opacity: .5; cursor: not-allowed}
    .file{display: inline-block}
    input[type=file]{display: none}
    .file label{display: inline-block; padding: 9px 14px; border: 1px dashed var(--input-border); border-radius: 12px; cursor: pointer; color: var(--muted); transition: all .2s}
    .file label:hover{border-color: var(--accent); color: var(--text)}
    .drag{margin:14px; border: 1px dashed #334155; border-radius: 14px; padding: 14px; text-align: center; color: var(--muted)}
    .drag.dragover{border-color: var(--accent); color: var(--text); background: var(--general-bg)}
    .status{padding: 12px 16px; border-bottom: 1px solid #1f2937; font-family: ui-monospace,monospace}
    .status.ok{color: var(--ok)} .status.warn{color: var(--warn)} .status.err{color: var(--err)}
    .errors{padding: 12px 16px; border-bottom:1px solid #1f2937}
    .errors .errline{color: var(--err); font-family: ui-monospace,monospace; white-space:pre-wrap}
    .viewer{padding: 12px 16px}
    .code{font-family: ui-monospace,monospace; font-size: 13px}
    .node{position: relative; padding-left: 18px; margin-left: 4px}
    .toggle{position: absolute; left: 0; top: 2px; cursor: pointer; user-select: none}
    .toggle::before{content: '▸'; display: inline-block; transform: rotate(0deg); transition: transform .15s ease}
    .expanded>.toggle::before{transform: rotate(90deg)}
    .pair{display: flex; gap: 8px; align-items: flex-start}
    .key{color: var(--key)}
    .sep{color: #475569}
    .type-string{color: var(--string)} .type-number{color: var(--number)} .type-boolean{color: var(--boolean)} .type-null{color: var(--null)}
    .type-object>.summary{color: var(--object)} .type-array>.summary{color: var(--array)}
    .children{margin-left: 14px; border-left: 1px dashed #334155; padding-left: 10px}
    .summary{cursor:pointer}
    .muted{color: var(--muted)}
    .kbadge{font-size: 11px; padding: 1px 6px; border: 1px solid #334155; border-radius: 999px; color: var(--muted)}
    .footer{padding: 14px 16px; border-top: 1px solid #1f2937; color: var(--muted); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px}
    .search{display: flex; gap: 8px}
    .search input{flex: 1; min-width: 220px; background: var(--general-bg); border: 1px solid var(--input-border); border-radius: 10px; color: var(--text); padding: 8px 10px}
    .hit{background: rgba(34,211,238,.15)}
  </style>
</head>
<body>
	<div class="container">
		<div class="card">
			<div class="header">
				<div class="title">JSON Viewer</div>
				<div class="controls">
					<div class="file">
						<!-- Accept JSON/Excel files -->
						<input id="file" type="file" accept=".json,application/json,.xlsx,.xls,.csv,text/*" />
						<label for="file">Choose file (JSON or Excel)…</label>
					</div>
					<button class="btn" id="expandAll" disabled>Expand all</button>
					<button class="btn" id="collapseAll" disabled>Collapse all</button>
					<button class="btn" id="copyRaw" disabled>Copy raw</button>
					<button class="btn" id="downloadPretty" disabled>Download pretty</button>
					<button class="btn" id="themeToggle">Toggle theme</button>
				</div>
			</div>
			<div class="drag" id="drop">Drag & drop a JSON or Excel file here, or use “Choose file (JSON or Excel)…” above.</div>
			<div id="status" class="status warn">No file loaded.</div>

			<!-- Excel Configuration Panel (Hidden by default) -->
			<div id="excelConfig" class="card" style="margin: 14px; padding: 16px; display: none; border: 1px solid var(--btn-bg);">
				<div style="font-weight: 600; margin-bottom: 10px;">Excel Options</div>
				<div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 12px;">
					<div>
						<label for="sheetSelect" style="font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px;">Sheet</label>
						<select id="sheetSelect" style="padding: 6px; background: var(--bg); border: 1px solid #334155; color: var(--text); border-radius: 6px;"></select>
					</div>
				</div>
				<div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center;">
					<div>
						<label for="headerRow" style="font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px;">Header Row (1-based)</label>
						<input type="number" id="headerRow" min="1" value="1" style="width: 80px; padding: 6px; background: var(--bg); border: 1px solid #334155; color: var(--text); border-radius: 6px;">
					</div>
					<div>
						<label for="maxRows" style="font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px;">Max Rows (Optional)</label>
						<input type="number" id="maxRows" min="1" placeholder="All" style="width: 100px; padding: 6px; background: var(--bg); border: 1px solid #334155; color: var(--text); border-radius: 6px;">
					</div>
					<div>
						<label for="maxCols" style="font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px;">Max Cols (Optional)</label>
						<input type="number" id="maxCols" min="1" placeholder="All" style="width: 100px; padding: 6px; background: var(--bg); border: 1px solid #334155; color: var(--text); border-radius: 6px;">
					</div>
					<button id="applyExcelConfig" class="btn" style="height: 38px; align-self: flex-end;">Apply & Refresh</button>
				</div>
			</div>

			<div id="errors" class="errors" hidden></div>
			<div class="viewer code" id="viewer" aria-live="polite"></div>
			<div class="footer">
				<div class="search">
					<input id="search" type="search" placeholder="Search keys or values… (press Enter)" />
					<button class="btn" id="clearSearch">Clear</button>
				</div>
				<div class="muted">Hover a value to see its path</div>
			</div>
		</div>
	</div>
	<!-- SheetJS library from CDN -->
	<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
	<script>
		(function() {
			const fileInput = document.getElementById('file'),
				  drop = document.getElementById('drop'),
				  statusEl = document.getElementById('status'),
				  errorsEl = document.getElementById('errors'),
				  viewer = document.getElementById('viewer'),
				  expandAllBtn = document.getElementById('expandAll'),
				  collapseAllBtn = document.getElementById('collapseAll'),
				  copyRawBtn = document.getElementById('copyRaw'),
				  downloadPrettyBtn = document.getElementById('downloadPretty'),
				  searchInput = document.getElementById('search'),
				  clearSearchBtn = document.getElementById('clearSearch'),
				  themeToggle = document.getElementById('themeToggle');

			const excelConfigPanel = document.getElementById('excelConfig');

			let rawText = '', jsonData = null, currentTheme = 'light';
			document.documentElement.dataset.theme = 'light';

			function setStatus(m, c) {
				statusEl.textContent = m;
				statusEl.className = 'status ' + (c || '');
			}

			function showErrors(lines) {
				if(!lines.length) {
					errorsEl.hidden=true;errorsEl.innerHTML='';
					return;
				}
				errorsEl.hidden = false;
				errorsEl.innerHTML = lines.map(t=>`<div class="errline">❌ ${escapeHtml(t)}</div>`).join('')
			}

			function escapeHtml(s) {
				return s.replace(/[&<>"']/g, c => (
					{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]
				));
			}

			function readJsonFile(f) {
				const r = new FileReader();
				r.onload = () => {
					rawText = r.result;
					try {
						jsonData = JSON.parse(rawText);
						setStatus(`Loaded: ${f.name} — ${formatBytes(f.size)} — valid JSON`,'ok');
						showErrors([]);
						render(jsonData);
						expandAllBtn.disabled = collapseAllBtn.disabled = copyRawBtn.disabled = downloadPrettyBtn.disabled = false;
					} catch(err) {
						jsonData = null;
						render(null);
						setStatus('Parse error — invalid JSON','err');
						showErrors([err.message]);
					}
				};
				r.onerror = () => {
					setStatus('Failed to read file','err');
					showErrors([String(r.error||'Unknown error')]);
				};
				r.readAsText(f);
			}

			class ExcelHandler {
				static #workbook = null;

				// To make the Excel Options panel sheet-specific, we need to track configuration 
				// per sheet. Hence, the following state variables
				static #sheetConfigs = {}; // { 'Sheet1': {headerRow: 1, maxRows: '', maxCols: ''}, ... }
				static #currentSheet = null;

				// UI elements specific to Excel Options panel
				static #sheetSelect = document.getElementById('sheetSelect');
				static #headerRowInput = document.getElementById('headerRow');
				static #maxRowsInput = document.getElementById('maxRows');
				static #maxColsInput = document.getElementById('maxCols');

				static #initialize(rawBuffer) {
					const data = new Uint8Array(rawBuffer);
					ExcelHandler.#workbook = XLSX.read(data, { type: 'array' });

					// Initialize sheet configs with defaults
					ExcelHandler.#sheetConfigs = {};
					Object.keys(ExcelHandler.#workbook.Sheets).forEach(name => {
						ExcelHandler.#sheetConfigs[name] = { headerRow: 1, maxRows: '', maxCols: '' };
					});

					ExcelHandler.#currentSheet = Object.keys(ExcelHandler.#workbook.Sheets)[0]; // Select first sheet

					// Populate sheet selector (UI)
					ExcelHandler.#sheetSelect.innerHTML = '';
					Object.keys(ExcelHandler.#workbook.Sheets).forEach(name => {
						const opt = document.createElement('option');
						opt.value = name;
						opt.textContent = name;
						ExcelHandler.#sheetSelect.appendChild(opt);
					});
					ExcelHandler.#sheetSelect.value = ExcelHandler.#currentSheet;

					ExcelHandler.updateConfig(ExcelHandler.#currentSheet);
				}

				static reset() {
					ExcelHandler.#workbook = null;
					ExcelHandler.#sheetConfigs = {}; // Clear sheet configs
					ExcelHandler.#currentSheet = null;
				}

				static readExcelFile(f) {
					excelConfigPanel.style.display = 'none'; // Hide initially

					const r = new FileReader();

					r.onload = (e) => {
						try {
							const rawBuffer = e.target.result;
							ExcelHandler.#initialize(rawBuffer);

							excelConfigPanel.style.display = 'block';
							ExcelHandler.processExcelData(); // Process only selected sheet

							setStatus(`Loaded: ${f.name} — ${formatBytes(f.size)} — Excel parsed`, 'ok');
							showErrors([]);
							expandAllBtn.disabled = collapseAllBtn.disabled = copyRawBtn.disabled = downloadPrettyBtn.disabled = false;
						} catch(err) {
							ExcelHandler.reset();
							excelConfigPanel.style.display = 'none';
							jsonData = null;
							render(null);
							setStatus('Parse error — invalid Excel file', 'err');
							showErrors([err.message]);
						}
					};

					r.readAsArrayBuffer(f);
				}

				static processExcelData(sheetName=ExcelHandler.#currentSheet) {
					const ws = ExcelHandler.#workbook.Sheets[sheetName];

					jsonData = {};

					if (!ws) {
						jsonData[sheetName] = [];
						render(jsonData);
						return;
					}

					// Get the used range of the sheet first
					const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:A1');
					const jsonOpts = ExcelHandler.#getJsonOpts(sheetName, range);

					const rows = XLSX.utils.sheet_to_json(ws, jsonOpts);
					jsonData[sheetName] = rows;
					render(jsonData);
				}

				static updateConfig(sheetName) {
					ExcelHandler.#currentSheet = sheetName;

					const cfg = ExcelHandler.#sheetConfigs[sheetName] || { headerRow: 1, maxRows: '', maxCols: '' };
					ExcelHandler.#headerRowInput.value = cfg.headerRow;
					ExcelHandler.#maxRowsInput.value = cfg.maxRows;
					ExcelHandler.#maxColsInput.value = cfg.maxCols;
				}

				static #saveConfig(sheetName) {
					ExcelHandler.#sheetConfigs[sheetName] = {
						headerRow: parseInt(ExcelHandler.#headerRowInput.value, 10) || 1,
						maxRows: ExcelHandler.maxRowsInput.value ? parseInt(ExcelHandler.maxRowsInput.value, 10) : '',
						maxCols: ExcelHandler.maxColsInput.value ? parseInt(ExcelHandler.maxColsInput.value, 10) : ''
					};
				}

				static applyConfig() {
					if (!ExcelHandler.#workbook || !ExcelHandler.#currentSheet) {
						setStatus('No Excel file loaded to refresh.', 'warn');
						return;
					}

					ExcelHandler.#saveConfig(ExcelHandler.#currentSheet);

					try {
						ExcelHandler.processExcelData();
						setStatus(`Applied settings for sheet "${ExcelHandler.#currentSheet}"`, 'ok');
					} catch (err) {
						setStatus('Error applying settings: ' + err.message, 'err');
					}
				};

				static #getJsonOpts(sheetName, range) {
					const cfg = ExcelHandler.#sheetConfigs[sheetName] || { headerRow: 1, maxRows: '', maxCols: '' };
					const headerRowVal = cfg.headerRow;
					const maxRowsVal = cfg.maxRows ? parseInt(cfg.maxRows, 10) : null;
					const maxColsVal = cfg.maxCols ? parseInt(cfg.maxCols, 10) : null;
					//const rangeSpec = '';//document.getElementById('rangeSpec').value.trim(); // empty → ignore

					const jsonOpts = {
						defval: null,
						raw: false,
						header: headerRowVal - 1
					};

					// Construct range string if limits are set (e.g., "A1:D100")
					// We need to calculate the range based on max rows/cols relative to the header
					if (maxRowsVal || maxColsVal) {
						// Decode the sheet's used range
						const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:A1');

						// Calculate the absolute end row (0-based)
						// Formula: (Header Row Index) + (Max Rows - 1)
						// Clamp it so we don't exceed the actual sheet size
						const targetEndRow = (headerRowVal - 1) + (maxRowsVal ? maxRowsVal - 1 : 0);
						const absEndRow = Math.min(range.e.r, targetEndRow);

						// Calculate the absolute end column (0-based)
						// Formula: (Max Cols - 1)
						// Clamp it so we don't exceed the actual sheet size
						const targetEndCol = maxColsVal ? maxColsVal - 1 : 0;
						const absEndCol = Math.min(range.e.c, targetEndCol);

						// Encode the range string (Start is always A1 -> 0,0)
						const rangeStr = XLSX.utils.encode_range({ 
							s: { r: 0, c: 0 }, 
							e: { r: absEndRow, c: absEndCol } 
						});

						jsonOpts.range = rangeStr;
					}
				}
			}

			// Excel Config UI events
			document.getElementById('sheetSelect').onchange = (e) => {
				ExcelHandler.updateConfig(e.target.value);
				ExcelHandler.processExcelData();
			};

			// Excel Config UI events
			document.getElementById('applyExcelConfig').onclick = () => {
				ExcelHandler.applyConfig();
			};

			// Helper to determine file type
			function getFileType(filename) {
				const ext = filename.split('.').pop().toLowerCase();
				if (['json'].includes(ext)) return 'json';
				if (['xlsx', 'xls', 'csv'].includes(ext)) return 'excel';
				return 'unknown';
			}

			// Unified handler
			fileInput.addEventListener('change', e => {
				const f = e.target.files && e.target.files[0];
				if(f) handleFile(f);
			});

			function handleFile(f) {
				const type = getFileType(f.name);

				if (type === 'unknown') {
					setStatus('Unsupported file type. Please select JSON or Excel.', 'err');
					return;
				}

				if (type === 'json') {
					excelConfigPanel.style.display = 'none'; // Hide panel for JSON
					ExcelHandler.reset();
					readJsonFile(f);
				} else {
					ExcelHandler.readExcelFile(f);
				}
			}

			;['dragenter', 'dragover'].forEach(evt => drop.addEventListener(evt, e => {
				e.preventDefault();
				drop.classList.add('dragover');
			}));

			;['dragleave', 'drop'].forEach(evt => drop.addEventListener(evt, e => {
				e.preventDefault();
				drop.classList.remove('dragover');
			}));

			drop.addEventListener('drop',e => {
				const f = e.dataTransfer.files && e.dataTransfer.files[0];
				if(f) handleFile(f);
			});

			function typeOf(v) {
				if(v === null) return'null';
				if(Array.isArray(v)) return'array';
				return typeof v;
			}

			function render(data) {
				viewer.innerHTML = '';
				if(data == null) {
					viewer.innerHTML = '<div class="muted">Load a JSON file to view it here.</div>';
					return;
				}
				viewer.appendChild(buildNode('', data, ''));
			}

			function buildNode(key, value, path){
				const t = typeOf(value),
					  node = document.createElement('div');
				node.className =`node type-${t}`;

				const pair = document.createElement('div');
				pair.className = 'pair';

				if(t === 'object' || t === 'array') {
					const toggle = document.createElement('span');
					toggle.className = 'toggle';
					pair.appendChild(toggle);
					node.classList.add('expanded');
					toggle.onclick = () => toggleNode(node);
				} else {
					const spacer = document.createElement('span');
					spacer.style.display = 'inline-block';
					spacer.style.width = '14px';
					pair.appendChild(spacer);
				}

				if(key !== '') {
					const keyEl = document.createElement('span');
					keyEl.className = 'key';
					keyEl.textContent = JSON.stringify(String(key));
					pair.appendChild(keyEl);
					const sep = document.createElement('span');
					sep.className = 'sep';
					sep.textContent = ':';
					pair.appendChild(sep);
				}

				const summary = document.createElement('span');
				summary.className='summary';
				if(t === 'string') {
					summary.classList.add('type-string');
					summary.textContent = JSON.stringify(value);
				}
				else if(t === 'number') {
					summary.classList.add('type-number');
					summary.textContent = String(value);
				}
				else if(t === 'boolean') {
					summary.classList.add('type-boolean');
					summary.textContent = String(value);
				}
				else if(t === 'null') {
					summary.classList.add('type-null');
					summary.textContent = 'null';
				}
				else if(t === 'array') {
					summary.textContent = `Array(${value.length})`;
					summary.title = 'Click to expand/collapse';
				}
				else if(t === 'object') {
					summary.textContent = `Object{${Object.keys(value).length}}`;
					summary.title = 'Click to expand/collapse';
				}
				pair.appendChild(summary);
				node.appendChild(pair);

				if(t === 'object' || t === 'array') {
					const children = document.createElement('div');
					children.className = 'children';
					const entries = t === 'object' ? Object.entries(value) : value.map((v, i) => [i, v]);
					for(const[k, v]of entries) {
						children.appendChild(buildNode(k, v, path + (key !== '' ? `/${key}` : '')));
					}
					node.appendChild(children);
					summary.onclick = () => toggleNode(node);
					const badge = document.createElement('span');
					badge.className = 'kbadge';
					badge.textContent = t === 'object' ? `${Object.keys(value).length} keys` : `${value.length} items`;
					pair.appendChild(badge);
				}
				pair.title = path + (key !== '' ? `/${key}` : '');
				return node;
			}

			function toggleNode(node) {
				const c = node.querySelector(':scope>.children');
				if(!c) return;
				if(node.classList.contains('expanded')) {
					node.classList.remove('expanded');
					c.style.display = 'none';
				} else {
					node.classList.add('expanded');
					c.style.display = '';
				}
			}

			function expandCollapseAll(expand) {
				viewer.querySelectorAll('.node.type-object,.node.type-array').forEach(n => {
					const c = n.querySelector(':scope>.children');
					if(!c) return;
					if(expand) {
						n.classList.add('expanded');
						c.style.display = ''
					} else {
						n.classList.remove('expanded');
						c.style.display = 'none'
					}
				});
			}

			expandAllBtn.onclick = () => expandCollapseAll(true);

			collapseAllBtn.onclick = () => expandCollapseAll(false);

			copyRawBtn.onclick = async() => {
				try {
					await navigator.clipboard.writeText(rawText||'');
					setStatus('Raw JSON copied','ok');
				} catch {
					setStatus('Clipboard failed','err');
				}
			};

			downloadPrettyBtn.onclick = () => {
				const blob = new Blob([JSON.stringify(jsonData, null, 2)], {type: 'application/json'});
				const a = document.createElement('a');
				a.href = URL.createObjectURL(blob);
				a.download = 'data.pretty.json';
				a.click();
				URL.revokeObjectURL(a.href);
			};

			function clearHits() {
				viewer.querySelectorAll('.hit').forEach(el => el.classList.remove('hit'));
			}

			function search(q) {
				clearHits();
				if(!q) return;
				const re = new RegExp(q.replace(/[.*+?^${}()|[\\]\\]/g, '\\$&'), 'i');
				viewer.querySelectorAll('.pair').forEach(p => {
					if(re.test(p.textContent))
						p.classList.add('hit');
				});
			}

			searchInput.onkeydown = e => {
				if(e.key === 'Enter')
					search(e.target.value.trim());
			};

			clearSearchBtn.onclick= () => {
				searchInput.value = '';
				clearHits();
				searchInput.focus();
			};

			function formatBytes(b) {
				if(b === 0) return'0 B';

				const k = 1024, u = ['B','KB','MB','GB','TB'], i = Math.floor(Math.log(b) / Math.log(k));
				return(b / Math.pow(k, i)).toFixed(2) + ' ' + u[i];
			}

			themeToggle.onclick = () => {
				if(currentTheme === 'light') {
					document.documentElement.dataset.theme = 'dark';
					currentTheme = 'dark'
				} else {
					document.documentElement.dataset.theme = '';
					currentTheme = 'light'
				}
			}
		})();
	</script>
</body>
</html>
